<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上傳學生相片 (Base64)</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans min-h-screen flex items-center justify-center p-6">

    <div class="bg-white rounded-xl shadow-lg p-8 w-full max-w-md">
        <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">上傳學生相片 (Base64)</h2>

        <!-- 圖片預覽區 -->
        <div class="flex flex-col items-center justify-center mb-6">
            <div class="w-32 h-32 rounded-full border-4 border-gray-100 shadow-inner overflow-hidden bg-gray-50 flex items-center justify-center mb-4 relative">
                <!-- 預設圖示 (SVG) -->
                <svg id="placeholder-icon" class="w-12 h-12 text-gray-300" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>
                <!-- 預覽圖片 -->
                <img id="preview-img" src="" alt="預覽" class="w-full h-full object-cover hidden absolute inset-0" />
            </div>
            
            <input type="file" id="file-input" accept="image/*" class="hidden" />
            
            <button id="select-btn" class="px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-md font-medium transition-colors text-sm">
                選擇相片
            </button>
        </div>

        <!-- 狀態與錯誤訊息區塊 -->
        <div id="message-container" class="mb-4 hidden"></div>

        <!-- Base64 字串長度提示 -->
        <div id="base64-container" class="mb-6 text-xs text-gray-500 bg-gray-50 p-3 rounded-md break-all overflow-hidden h-20 relative hidden">
            <div class="absolute top-0 left-0 w-full h-full bg-gradient-to-b from-transparent to-gray-50 pointer-events-none"></div>
            <strong>Base64 預覽 (已壓縮):</strong><br/>
            <span id="base64-text"></span>
        </div>

        <!-- 儲存按鈕 -->
        <button id="upload-btn" disabled class="w-full flex items-center justify-center py-3 rounded-lg font-bold text-white transition-colors bg-blue-300 cursor-not-allowed">
            <svg id="upload-icon" class="w-5 h-5 mr-2" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
            </svg>
            <span id="upload-text">儲存至 Firestore</span>
        </button>
    </div>

    <script>
        // 取得 DOM 元素
        const fileInput = document.getElementById('file-input');
        const selectBtn = document.getElementById('select-btn');
        const previewImg = document.getElementById('preview-img');
        const placeholderIcon = document.getElementById('placeholder-icon');
        const messageContainer = document.getElementById('message-container');
        const base64Container = document.getElementById('base64-container');
        const base64Text = document.getElementById('base64-text');
        const uploadBtn = document.getElementById('upload-btn');
        const uploadText = document.getElementById('upload-text');
        const uploadIcon = document.getElementById('upload-icon');

        let currentBase64 = null;

        // 顯示訊息的輔助函數
        function showMessage(type, text) {
            messageContainer.classList.remove('hidden');
            if (type === 'error') {
                messageContainer.className = 'mb-4 p-3 bg-red-50 text-red-600 rounded-md flex items-center text-sm';
                messageContainer.innerHTML = `<svg class="w-4 h-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>${text}`;
            } else if (type === 'success') {
                messageContainer.className = 'mb-4 p-3 bg-green-50 text-green-600 rounded-md flex items-center text-sm';
                messageContainer.innerHTML = `<svg class="w-4 h-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>${text}`;
            }
        }

        // 點擊「選擇相片」按鈕觸發隱藏的 file input
        selectBtn.addEventListener('click', () => {
            fileInput.click();
        });

        // 處理圖片選擇與壓縮
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // 檢查是否為圖片
            if (!file.type.startsWith('image/')) {
                showMessage('error', '請上傳圖片檔案 (JPG, PNG)');
                return;
            }

            messageContainer.classList.add('hidden'); // 清除之前的訊息

            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    // 1. 設定壓縮後的目標尺寸 (150x150)
                    const MAX_WIDTH = 150;
                    const MAX_HEIGHT = 150;
                    let width = img.width;
                    let height = img.height;

                    // 計算等比例縮放
                    if (width > height) {
                        if (width > MAX_WIDTH) {
                            height = Math.round(height * (MAX_WIDTH / width));
                            width = MAX_WIDTH;
                        }
                    } else {
                        if (height > MAX_HEIGHT) {
                            width = Math.round(width * (MAX_HEIGHT / height));
                            height = MAX_HEIGHT;
                        }
                    }

                    // 2. 使用 Canvas 繪製縮小後的圖片
                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    // 3. 將 Canvas 轉換為 Base64 (JPEG 格式，品質 0.7)
                    currentBase64 = canvas.toDataURL('image/jpeg', 0.7);
                    
                    // 更新 UI 顯示
                    previewImg.src = currentBase64;
                    previewImg.classList.remove('hidden');
                    placeholderIcon.classList.add('hidden');
                    
                    base64Text.textContent = currentBase64;
                    base64Container.classList.remove('hidden');

                    // 啟用上傳按鈕
                    uploadBtn.disabled = false;
                    uploadBtn.className = 'w-full flex items-center justify-center py-3 rounded-lg font-bold text-white transition-colors bg-blue-600 hover:bg-blue-700';
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        // 模擬上傳至 Firestore
        uploadBtn.addEventListener('click', async () => {
            if (!currentBase64) return;
            
            // 進入處理中狀態
            uploadBtn.disabled = true;
            uploadBtn.className = 'w-full flex items-center justify-center py-3 rounded-lg font-bold text-white transition-colors bg-blue-300 cursor-not-allowed';
            uploadText.textContent = '處理中...';
            uploadText.classList.add('animate-pulse');
            uploadIcon.classList.add('hidden');
            messageContainer.classList.add('hidden');
            
            try {
                // 模擬網路延遲 1 秒
                await new Promise(resolve => setTimeout(resolve, 1000));
                
                /* 
                  【實際的 Firestore 整合方式】
                  如果你在 HTML 中有引入 Firebase SDK，程式碼會寫在這裡：
                  
                  // 假設已經初始化了 db
                  const studentRef = firebase.firestore().collection("students").doc("student_id_123");
                  await studentRef.update({
                    photoBase64: currentBase64
                  });
                */
                
                showMessage('success', '成功儲存至 Firestore！');
            } catch (error) {
                showMessage('error', '上傳失敗');
            } finally {
                // 恢復按鈕狀態
                uploadBtn.disabled = false;
                uploadBtn.className = 'w-full flex items-center justify-center py-3 rounded-lg font-bold text-white transition-colors bg-blue-600 hover:bg-blue-700';
                uploadText.textContent = '儲存至 Firestore';
                uploadText.classList.remove('animate-pulse');
                uploadIcon.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
