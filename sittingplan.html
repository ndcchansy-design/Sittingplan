<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>座位表排版系統</title>
    <!-- 引入 Tailwind CSS 快速排版 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f9fafb; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .student-item { cursor: grab; }
        .student-item:active { cursor: grabbing; }
        .seat-dropzone.drag-over { background-color: #eff6ff; border-color: #3b82f6; }
        .editable-title:hover { background-color: #f3f4f6; border-radius: 0.25rem; cursor: text; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- 左側：未分配學生名單 -->
    <aside class="w-80 bg-white border-r border-gray-200 flex flex-col h-full">
        <div class="p-4 border-b border-gray-200">
            <h2 class="text-lg font-bold text-gray-800">未分配學生</h2>
        </div>
        
        <!-- 班級群組標題 -->
        <div class="bg-blue-50 px-4 py-2 flex justify-between items-center border-b border-gray-100">
            <span class="font-bold text-blue-800" id="class-name-label">載入中...</span>
            <span class="bg-blue-200 text-blue-800 text-xs font-bold px-2 py-1 rounded-full" id="unassigned-count">0</span>
        </div>

        <!-- 學生列表 -->
        <div class="flex-1 overflow-y-auto p-4 space-y-3" id="student-list">
            <!-- 學生卡片會由 JS 動態產生在這裡 -->
            <div class="text-center text-gray-400 mt-10">正在從 Firebase 載入資料...</div>
        </div>
    </aside>

    <!-- 右側：座位表主區域 -->
    <main class="flex-1 flex flex-col h-full overflow-y-auto bg-gray-50 p-8">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800 inline-block px-4 py-2 editable-title" contenteditable="true">新座位表 (點擊修改標題)</h1>
        </div>

        <!-- 座位網格 (預設 4欄 x 6列 = 24個座位，可自行在 JS 修改) -->
        <div class="max-w-4xl mx-auto w-full grid grid-cols-4 gap-6" id="seating-grid">
            <!-- 座位會由 JS 動態產生在這裡 -->
        </div>
    </main>

    <!-- Firebase 與 核心邏輯 -->
    <script type="module">
        // 1. 引入 Firebase SDK (使用 v10 模組化語法)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ==========================================
        // ⚠️ 請在這裡填入您自己的 Firebase 設定 ⚠️
        // ==========================================
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // 初始化 Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 系統狀態
        let students = []; // 所有學生資料
        let seats = Array(24).fill(null); // 座位陣列，null 代表空位
        const defaultAvatar = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23ccc"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>';

        // 2. 從 Firebase 讀取資料 (包含修復相片破圖的邏輯)
        async function loadStudentsFromFirebase() {
            try {
                // ⚠️ 注意：這裡的 "students" 是您的 Firestore 集合名稱，如果不同請修改
                const querySnapshot = await getDocs(collection(db, "students"));
                const fetchedStudents = [];
                
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    let photoUrl = defaultAvatar;
                    
                    // --- 增強照片讀取邏輯，適應不同格式 ---
                    if (data.photoBase64) {
                        if (String(data.photoBase64).startsWith('data:image')) {
                            photoUrl = data.photoBase64; 
                        } else {
                            photoUrl = 'data:image/png;base64,' + data.photoBase64; 
                        }
                    } else if (data.photoUrl) {
                        photoUrl = data.photoUrl;
                    } else if (data.photo) {
                        photoUrl = data.photo; 
                    }
                    // ---------------------------------------------
                    
                    let rawNumber = data.studentNum || data.number || data.seatNumber || '';
                    let displayNum = rawNumber ? String(rawNumber).match(/\d+/)?.[0].padStart(2, '0') || rawNumber : '';

                    fetchedStudents.push({
                        id: doc.id, 
                        name: data.name || '未知', 
                        number: displayNum, 
                        className: data.className || '1A', // 預設給個班級
                        photo: photoUrl,
                        isAssigned: false // 標記是否已排入座位
                    });
                });
                
                // 依照座號排序
                students = fetchedStudents.sort((a, b) => parseInt(a.number) - parseInt(b.number));
                renderApp();

            } catch (error) { 
                console.error("讀取學生失敗:", error);
                document.getElementById('student-list').innerHTML = `<div class="text-red-500 text-center mt-10">載入失敗，請檢查 Firebase 設定與權限。<br>${error.message}</div>`;
            }
        }

        // 3. 渲染畫面
        function renderApp() {
            renderSidebar();
            renderSeats();
        }

        // 渲染左側名單
        function renderSidebar() {
            const listContainer = document.getElementById('student-list');
            listContainer.innerHTML = '';
            
            const unassigned = students.filter(s => !s.isAssigned);
            document.getElementById('unassigned-count').textContent = unassigned.length;
            if(unassigned.length > 0) {
                document.getElementById('class-name-label').textContent = unassigned[0].className;
            }

            unassigned.forEach(student => {
                const div = document.createElement('div');
                div.className = 'student-item flex items-center p-3 bg-white border border-gray-200 rounded-lg shadow-sm hover:shadow-md transition-shadow';
                div.draggable = true;
                
                // 拖曳事件
                div.addEventListener('dragstart', (e) => {
                    e.dataTransfer.setData('text/plain', student.id);
                });

                div.innerHTML = `
                    <img src="${student.photo}" alt="${student.name}" class="w-10 h-10 rounded-full object-cover border border-gray-200 mr-3">
                    <div class="text-sm font-medium text-gray-700">
                        <span class="text-blue-600 font-bold mr-1">(${student.number})</span> ${student.name}
                    </div>
                `;
                listContainer.appendChild(div);
            });
        }

        // 渲染右側座位
        function renderSeats() {
            const grid = document.getElementById('seating-grid');
            grid.innerHTML = '';

            seats.forEach((studentId, index) => {
                const seatDiv = document.createElement('div');
                seatDiv.className = 'seat-dropzone h-32 rounded-xl flex flex-col items-center justify-center relative transition-colors';
                
                if (studentId) {
                    // 已有學生的座位
                    const student = students.find(s => s.id === studentId);
                    seatDiv.classList.add('bg-white', 'border-2', 'border-blue-400', 'shadow-sm', 'cursor-pointer');
                    seatDiv.innerHTML = `
                        <img src="${student.photo}" class="w-14 h-14 rounded-full object-cover border-2 border-white shadow-sm mb-2">
                        <div class="text-sm font-bold text-gray-800">
                            <span class="text-blue-600">(${student.number})</span> ${student.name}
                        </div>
                    `;
                    // 點擊可以取消分配
                    seatDiv.addEventListener('click', () => {
                        student.isAssigned = false;
                        seats[index] = null;
                        renderApp();
                    });
                } else {
                    // 空位
                    seatDiv.classList.add('border-2', 'border-dashed', 'border-gray-300', 'text-gray-400');
                    seatDiv.innerHTML = `<span class="text-sm">空位</span>`;
                }

                // 設置放置區域事件 (Dropzone)
                seatDiv.addEventListener('dragover', (e) => {
                    e.preventDefault(); // 允許放置
                    if(!studentId) seatDiv.classList.add('drag-over');
                });
                seatDiv.addEventListener('dragleave', () => {
                    seatDiv.classList.remove('drag-over');
                });
                seatDiv.addEventListener('drop', (e) => {
                    e.preventDefault();
                    seatDiv.classList.remove('drag-over');
                    const draggedId = e.dataTransfer.getData('text/plain');
                    
                    if (!studentId && draggedId) {
                        // 更新狀態
                        const student = students.find(s => s.id === draggedId);
                        if (student) {
                            student.isAssigned = true;
                            seats[index] = draggedId;
                            renderApp(); // 重新渲染
                        }
                    }
                });

                grid.appendChild(seatDiv);
            });
        }

        // 啟動程式
        loadStudentsFromFirebase();

    </script>
</body>
</html>
