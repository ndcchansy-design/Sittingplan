<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>йҖІйҡҺзҸӯзҙҡеә§дҪҚиЎЁз·ЁијҜеҷЁ (е–®й Ғ A4 еҲ—еҚ°зүҲ)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* --- еҲ—еҚ°е°Ҳеұ¬жЁЈејҸ --- */
        @media print {
            /* иЁӯе®ҡ A4 ж©«ејҸиҲҮйӮҠи·қ */
            @page { size: A4 landscape; margin: 10mm; }
            
            /* еј·еҲ¶йҡұи—ҸеҚ·и»ёиҲҮеӨҡйӨҳй Ғйқў */
            html, body { 
                -webkit-print-color-adjust: exact; 
                print-color-adjust: exact; 
                background: white; 
                margin: 0 !important;
                padding: 0 !important;
                width: 100% !important;
                height: 100% !important;
                overflow: hidden !important; 
            }
            
            .print-hidden { display: none !important; }
            
            main {
                display: block !important;
                width: 100% !important;
                height: 100% !important;
                overflow: hidden !important;
            }

            /* и®“еҲ—еҚ°еҚҖеЎҠзө•е°Қе®ҡдҪҚпјҢе®ҢзҫҺеЎ«ж»ҝдёҖй Ғ A4 */
            .print-area { 
                position: absolute !important;
                top: 0 !important;
                left: 0 !important;
                width: 100% !important; 
                height: 100% !important; 
                padding: 0 !important; 
                margin: 0 !important; 
                box-shadow: none !important; 
                border: none !important;
                overflow: hidden !important;
                display: flex !important;
                flex-direction: column !important;
                align-items: center !important;
            }

            /* йҒҝе…ҚеҲ—еҚ°жҷӮзҖҸиҰҪеҷЁеј·еҲ¶иЈҒеҲҮ */
            .overflow-x-auto, .overflow-y-auto {
                overflow: visible !important;
            }

            /* йҡұи—Ҹијёе…ҘжЎҶеә•з·ҡ */
            #chart-title {
                border: none !important;
                background: transparent !important;
            }
            
            #seat-grid {
                padding-bottom: 0 !important;
            }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* йҡұи—Ҹж•ёеӯ—ијёе…ҘжЎҶзҡ„дёҠдёӢз®ӯй ӯ */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        
        /* иҮӘиЁӮж»‘жЎҝжЁЈејҸ */
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #3b82f6;
            cursor: pointer;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800 min-h-screen flex flex-col">

    <!-- й ӮйғЁе°ҺиҰҪеҲ— -->
    <header class="bg-white shadow-sm px-6 py-4 flex justify-between items-center print-hidden z-10 relative">
        <div class="flex items-center space-x-2">
            <svg class="w-6 h-6 text-blue-600" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            <h1 class="text-xl font-bold text-gray-800">йҖІйҡҺеә§дҪҚиЎЁзі»зөұ</h1>
            <span id="sync-status" class="ml-4 text-sm text-gray-400">йҖЈз·ҡдёӯ...</span>
        </div>
        <div class="flex items-center space-x-4">
            <button onclick="window.print()" class="flex items-center space-x-2 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-md transition-colors">
                <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/></svg>
                <span>еҲ—еҚ° / еҢҜеҮә PDF</span>
            </button>
        </div>
    </header>

    <!-- жҺ§еҲ¶йқўжқҝ (иЁӯе®ҡиЎҢеҲ—иҲҮй–“и·қ) -->
    <div class="bg-white border-b px-6 py-4 flex flex-col gap-4 print-hidden shadow-sm z-0 relative">
        <div class="flex flex-wrap gap-6 items-center">
            <div class="flex items-center gap-2">
                <label class="text-sm font-medium text-gray-600">ж©«жҺ’(еҲ—)ж•ё:</label>
                <input type="number" id="input-rows" min="1" max="25" class="w-16 border rounded px-2 py-1 text-center focus:ring-2 focus:ring-blue-400 outline-none bg-gray-50">
            </div>
            <div class="flex items-center gap-2">
                <label class="text-sm font-medium text-gray-600">зӣҙжҺ’(иЎҢ)ж•ё:</label>
                <input type="number" id="input-cols" min="1" max="25" class="w-16 border rounded px-2 py-1 text-center focus:ring-2 focus:ring-blue-400 outline-none bg-gray-50">
            </div>
        </div>
        
        <div id="gap-controls-container" class="flex flex-wrap gap-3 items-center bg-gray-50 p-3 rounded-lg border border-gray-200 min-h-[60px]">
            <!-- JS жңғеңЁйҖҷиЈЎжҸ’е…Ҙж»‘жЎҝ -->
        </div>
    </div>

    <main class="p-6 flex gap-6 flex-1 overflow-hidden">
        <!-- е·ҰеҒҙпјҡзҸӯзҙҡиҲҮеӯёз”ҹеҗҚе–® -->
        <aside 
            id="sidebar"
            class="w-72 bg-white rounded-lg shadow-sm flex flex-col print-hidden shrink-0"
            ondragover="window.handleDragOver(event)"
            ondrop="window.handleDropOnSidebar(event)"
        >
            <div class="p-4 border-b bg-gray-50 rounded-t-lg">
                <h2 class="font-semibold text-gray-700">жңӘеҲҶй…Қеӯёз”ҹеҗҚе–®</h2>
                <p class="text-xs text-gray-500 mt-1">й»һж“ҠзҸӯзҙҡеұ•й–ӢеҗҚе–®пјҢжӢ–жӣій ӯеғҸиҮіеә§дҪҚ</p>
            </div>
            
            <div id="student-list" class="flex-1 overflow-y-auto p-4 space-y-4 no-scrollbar">
                <!-- JavaScript еӢ•ж…Ӣз”ҹжҲҗ -->
            </div>

            <div class="m-4 p-4 border-2 border-dashed border-red-200 rounded-lg bg-red-50 text-red-400 flex flex-col items-center justify-center text-sm">
                <svg class="w-6 h-6 mb-1 opacity-50" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>
                <p>е°Үеӯёз”ҹжӢ–жӣіиҮіжӯӨз§»йҷӨеә§дҪҚ</p>
            </div>
        </aside>

        <!-- еҸіеҒҙпјҡеә§дҪҚиЎЁе№ійқўең– -->
        <section class="flex-1 bg-white rounded-lg shadow-sm p-8 print-area flex flex-col overflow-y-auto relative w-full">
            <div class="text-center mb-8 flex flex-col items-center w-full">
                <input type="text" id="chart-title" value="иҮӘиЁӮеә§дҪҚиЎЁ" class="text-3xl font-bold text-gray-800 mb-4 text-center border-b-2 border-transparent hover:border-gray-300 focus:border-blue-500 outline-none bg-transparent transition-colors w-full max-w-lg">
                
                <div class="w-1/2 max-w-md mx-auto h-12 bg-gray-200 rounded-t-lg border-2 border-gray-300 flex items-center justify-center font-bold text-gray-600 tracking-widest">
                    и¬ӣ еҸ°
                </div>
            </div>

            <!-- еә§дҪҚз¶Іж ј (еӨ–еұӨе®№еҷЁиІ иІ¬зҪ®дёӯ) -->
            <div class="flex-1 flex items-start justify-center overflow-x-auto w-full">
                <div id="seat-grid" class="flex flex-col items-center w-max pb-8" style="row-gap: 1rem;">
                    <!-- JavaScript еӢ•ж…Ӣз”ҹжҲҗ -->
                </div>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-analytics.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB9jnyP4N-BSDDrSxaKgzL_t0U3ui4HvnE",
            authDomain: "sitting-plan-ac6b0.firebaseapp.com",
            projectId: "sitting-plan-ac6b0",
            storageBucket: "sitting-plan-ac6b0.firebasestorage.app",
            messagingSenderId: "487050816621",
            appId: "1:487050816621:web:38cb490e138c14ba8ba364",
            measurementId: "G-KGTEJM430H"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const students = [
            { id: 's1', name: 'зҺӢе°ҸжҳҺ', className: '3A', photo: 'https://picsum.photos/seed/s1/150/150' },
            { id: 's2', name: 'йҷіеӨ§ж–Ү', className: '3A', photo: 'https://picsum.photos/seed/s2/150/150' },
            { id: 's3', name: 'жқҺзҫҺзҺІ', className: '3A', photo: 'https://picsum.photos/seed/s3/150/150' },
            { id: 's4', name: 'ејөе®¶иұӘ', className: '3B', photo: 'https://picsum.photos/seed/s4/150/150' },
            { id: 's5', name: 'жһ—йӣ…е©·', className: '3B', photo: 'https://picsum.photos/seed/s5/150/150' },
            { id: 's6', name: 'й»ғе»әе®Ҹ', className: '3C', photo: 'https://picsum.photos/seed/s6/150/150' },
            { id: 's7', name: 'еҗіж·‘иҠ¬', className: '3C', photo: 'https://picsum.photos/seed/s7/150/150' },
            { id: 's8', name: 'еҠүеҶ е®Ү', className: '3C', photo: 'https://picsum.photos/seed/s8/150/150' },
        ];

        let config = {
            title: "дёүе№ҙзҙҡ и·ЁзҸӯйҒёдҝ® еә§дҪҚиЎЁ",
            rows: 6,
            cols: 5,
            columnGaps: [16, 16, 16, 16]
        };
        
        let seats = [];
        let expandedClasses = new Set(['3A', '3B', '3C']);
        let draggedStudentId = null;
        let dragSource = null;

        const studentListEl = document.getElementById('student-list');
        const seatGridEl = document.getElementById('seat-grid');
        const syncStatusEl = document.getElementById('sync-status');
        const gapControlsContainer = document.getElementById('gap-controls-container');
        
        const titleInput = document.getElementById('chart-title');
        const rowsInput = document.getElementById('input-rows');
        const colsInput = document.getElementById('input-cols');

        const CLASS_DOC_REF = doc(db, "seating_plans", "custom_class_01");

        function initSeatsArray() {
            const totalSeats = config.rows * config.cols;
            const newSeats = [];
            for (let i = 0; i < totalSeats; i++) {
                newSeats.push(seats[i] || { id: `seat-${i}`, studentId: null });
            }
            seats = newSeats;
        }

        async function loadData() {
            try {
                const docSnap = await getDoc(CLASS_DOC_REF);
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    if (data.config) {
                        config = data.config;
                        if (config.columnGap !== undefined && !config.columnGaps) {
                            config.columnGaps = Array(Math.max(0, config.cols - 1)).fill(config.columnGap);
                            delete config.columnGap;
                        }
                        if (!config.columnGaps) {
                            config.columnGaps = Array(Math.max(0, config.cols - 1)).fill(16);
                        }
                    }
                    if (data.seats) seats = data.seats;
                    syncStatusEl.textContent = "е·ІеҗҢжӯҘжңҖж–°иіҮж–ҷ";
                    syncStatusEl.className = "ml-4 text-sm text-green-500";
                } else {
                    initSeatsArray();
                    syncStatusEl.textContent = "е»әз«Ӣж–°еә§дҪҚиЎЁ";
                }
            } catch (error) {
                console.error("и®ҖеҸ–еӨұж•—:", error);
                syncStatusEl.textContent = "и®ҖеҸ–еӨұж•—";
                syncStatusEl.className = "ml-4 text-sm text-red-500";
                initSeatsArray();
            }
            updateUIFromConfig();
            renderGapControls();
            render();
        }

        async function saveData() {
            syncStatusEl.textContent = "е„Іеӯҳдёӯ...";
            syncStatusEl.className = "ml-4 text-sm text-yellow-500";
            try {
                await setDoc(CLASS_DOC_REF, { config, seats });
                syncStatusEl.textContent = "е·Іе„Іеӯҳ";
                syncStatusEl.className = "ml-4 text-sm text-green-500";
            } catch (error) {
                console.error("е„ІеӯҳеӨұж•—:", error);
                syncStatusEl.textContent = "е„ІеӯҳеӨұж•—";
                syncStatusEl.className = "ml-4 text-sm text-red-500";
            }
        }

        function updateUIFromConfig() {
            titleInput.value = config.title;
            rowsInput.value = config.rows;
            colsInput.value = config.cols;
        }

        titleInput.addEventListener('change', (e) => { config.title = e.target.value; saveData(); });
        
        function handleGridChange() {
            const newRows = parseInt(rowsInput.value) || 1;
            const newCols = parseInt(colsInput.value) || 1;
            
            config.rows = newRows;
            
            if (newCols !== config.cols) {
                const newGaps = [];
                for (let i = 0; i < newCols - 1; i++) {
                    newGaps.push(config.columnGaps[i] !== undefined ? config.columnGaps[i] : 16);
                }
                config.columnGaps = newGaps;
                config.cols = newCols;
                renderGapControls();
            }
            
            initSeatsArray();
            render();
            saveData();
        }

        rowsInput.addEventListener('change', handleGridChange);
        colsInput.addEventListener('change', handleGridChange);

        function renderGapControls() {
            gapControlsContainer.innerHTML = '';
            
            if (config.cols <= 1) {
                gapControlsContainer.innerHTML = '<span class="text-sm text-gray-400">еҸӘжңү 1 иЎҢжҷӮз„Ўжі•иЁӯе®ҡй–“и·қ</span>';
                return;
            }

            const labelSpan = document.createElement('span');
            labelSpan.className = "text-sm font-bold text-gray-700 mr-2";
            labelSpan.textContent = "еҖӢеҲҘиЎҢи·қиЁӯе®ҡ:";
            gapControlsContainer.appendChild(labelSpan);

            for (let i = 0; i < config.cols - 1; i++) {
                const gapDiv = document.createElement('div');
                gapDiv.className = "flex items-center gap-2 bg-white px-3 py-1.5 rounded-md border border-gray-200 shadow-sm";
                
                const label = document.createElement('label');
                label.className = "text-xs font-medium text-gray-600 whitespace-nowrap";
                label.textContent = `иЎҢ ${i + 1} иҲҮ ${i + 2}`;
                
                const input = document.createElement('input');
                input.type = "range";
                input.min = "0";
                input.max = "120";
                input.step = "4";
                input.value = config.columnGaps[i] !== undefined ? config.columnGaps[i] : 16;
                input.className = "w-20 h-1.5 bg-gray-200 rounded-lg appearance-none outline-none";
                
                const valDisplay = document.createElement('span');
                valDisplay.className = "text-xs text-blue-600 font-mono w-6 text-right";
                valDisplay.textContent = input.value;

                input.addEventListener('input', (e) => {
                    const val = parseInt(e.target.value);
                    valDisplay.textContent = val;
                    config.columnGaps[i] = val;
                    renderSeats(); 
                });
                
                input.addEventListener('change', () => { saveData(); });

                gapDiv.appendChild(label);
                gapDiv.appendChild(input);
                gapDiv.appendChild(valDisplay);
                gapControlsContainer.appendChild(gapDiv);
            }
        }

        function render() {
            renderSidebar();
            renderSeats();
        }

        function renderSidebar() {
            studentListEl.innerHTML = '';
            
            const unassignedStudents = students.filter(
                student => !seats.some(seat => seat.studentId === student.id)
            );

            const grouped = {};
            unassignedStudents.forEach(s => {
                if (!grouped[s.className]) grouped[s.className] = [];
                grouped[s.className].push(s);
            });

            if (Object.keys(grouped).length === 0) {
                studentListEl.innerHTML = '<p class="text-sm text-gray-400 text-center py-4">жүҖжңүеӯёз”ҹе·Іе®үжҺ’еә§дҪҚ</p>';
                return;
            }

            for (const [className, classStudents] of Object.entries(grouped)) {
                const isExpanded = expandedClasses.has(className);
                
                const groupHeader = document.createElement('div');
                groupHeader.className = "flex items-center justify-between bg-blue-50 px-3 py-2 rounded-md cursor-pointer hover:bg-blue-100 transition-colors mb-2";
                groupHeader.onclick = () => {
                    if (expandedClasses.has(className)) expandedClasses.delete(className);
                    else expandedClasses.add(className);
                    renderSidebar();
                };
                groupHeader.innerHTML = `
                    <span class="font-bold text-blue-800">${className} зҸӯ</span>
                    <span class="text-xs bg-blue-200 text-blue-800 px-2 py-1 rounded-full">${classStudents.length} дәә</span>
                `;
                studentListEl.appendChild(groupHeader);

                if (isExpanded) {
                    const listContainer = document.createElement('div');
                    listContainer.className = "space-y-2 mb-4 pl-2";
                    
                    classStudents.forEach(student => {
                        const div = document.createElement('div');
                        div.className = "flex items-center p-2 bg-white border border-gray-200 rounded-md cursor-grab active:cursor-grabbing hover:border-blue-400 shadow-sm transition-all";
                        div.draggable = true;
                        div.ondragstart = (e) => handleDragStart(e, student.id, 'list');
                        
                        div.innerHTML = `
                            <img src="${student.photo}" alt="${student.name}" class="w-8 h-8 rounded-full object-cover mr-3 border border-gray-200" />
                            <span class="font-medium text-sm text-gray-700">${student.name}</span>
                        `;
                        listContainer.appendChild(div);
                    });
                    studentListEl.appendChild(listContainer);
                }
            }
        }

        function renderSeats() {
            seatGridEl.innerHTML = '';

            for (let r = 0; r < config.rows; r++) {
                const rowDiv = document.createElement('div');
                rowDiv.className = "flex flex-row items-center";
                
                for (let c = 0; c < config.cols; c++) {
                    const index = r * config.cols + c;
                    const seat = seats[index];
                    if (!seat) continue;

                    const student = students.find(s => s.id === seat.studentId);
                    const div = document.createElement('div');
                    
                    // еҠ еӨ§еә§дҪҚжЎҶзҡ„е°әеҜё (еҺҹжң¬ w-20 h-20пјҢж”№зӮә w-24 h-28 / sm:w-28 sm:h-32)
                    div.className = `seat-box relative w-24 h-28 sm:w-28 sm:h-32 rounded-lg border-2 flex flex-col items-center justify-center p-2 transition-all ${
                        student ? 'border-blue-400 bg-blue-50 shadow-sm' : 'border-dashed border-gray-300 bg-gray-50 hover:bg-gray-100'
                    }`;
                    
                    if (c < config.cols - 1) {
                        const gap = config.columnGaps[c] !== undefined ? config.columnGaps[c] : 16;
                        div.style.marginRight = `${gap}px`;
                    }
                    
                    div.ondragover = handleDragOver;
                    div.ondrop = (e) => handleDropOnSeat(e, seat.id);

                    if (student) {
                        const innerDiv = document.createElement('div');
                        innerDiv.className = "w-full h-full flex flex-col items-center justify-center cursor-grab active:cursor-grabbing";
                        innerDiv.draggable = true;
                        innerDiv.ondragstart = (e) => handleDragStart(e, student.id, seat.id);
                        
                        // ж”ҫеӨ§зӣёзүҮе°әеҜё (еҺҹжң¬ w-10 h-10пјҢж”№зӮә w-16 h-16 / sm:w-20 sm:h-20)
                        // з§»йҷӨзҸӯзҙҡеҗҚзЁұзҡ„ span
                        innerDiv.innerHTML = `
                            <img src="${student.photo}" alt="${student.name}" class="w-16 h-16 sm:w-20 sm:h-20 rounded-full object-cover mb-2 border-2 border-white shadow-sm" />
                            <span class="font-bold text-sm sm:text-base text-gray-800 whitespace-nowrap">${student.name}</span>
                        `;
                        div.appendChild(innerDiv);
                    } else {
                        div.innerHTML = '<span class="text-xs text-gray-400 print-hidden">з©әдҪҚ</span>';
                    }

                    rowDiv.appendChild(div);
                }
                seatGridEl.appendChild(rowDiv);
            }
        }

        function handleDragStart(e, studentId, source) {
            draggedStudentId = studentId;
            dragSource = source;
            e.dataTransfer.setData('text/plain', studentId);
            e.dataTransfer.effectAllowed = 'move';
        }

        function handleDragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
        }

        function handleDropOnSeat(e, targetSeatId) {
            e.preventDefault();
            if (!draggedStudentId) return;

            const targetSeatIndex = seats.findIndex(s => s.id === targetSeatId);
            const targetSeat = seats[targetSeatIndex];

            if (dragSource.startsWith('seat-')) {
                const sourceSeatIndex = seats.findIndex(s => s.id === dragSource);
                const tempStudentId = targetSeat.studentId;
                seats[targetSeatIndex].studentId = seats[sourceSeatIndex].studentId;
                seats[sourceSeatIndex].studentId = tempStudentId;
            } else if (dragSource === 'list') {
                seats[targetSeatIndex].studentId = draggedStudentId;
            }

            draggedStudentId = null;
            dragSource = null;
            
            render();
            saveData();
        }

        function handleDropOnSidebar(e) {
            e.preventDefault();
            if (dragSource && dragSource.startsWith('seat-')) {
                const sourceSeatIndex = seats.findIndex(s => s.id === dragSource);
                if (sourceSeatIndex !== -1) {
                    seats[sourceSeatIndex].studentId = null;
                    render();
                    saveData();
                }
            }
            draggedStudentId = null;
            dragSource = null;
        }

        window.handleDragOver = handleDragOver;
        window.handleDropOnSidebar = handleDropOnSidebar;

        // ==========================================
        // еҲ—еҚ°иҮӘеӢ•зё®ж”ҫйӮҸијҜ (зўәдҝқдёҖй Ғ A4 ж©«ејҸеҚ°е®Ң)
        // ==========================================
        function applyPrintScale() {
            const grid = document.getElementById('seat-grid');
            grid.style.transform = 'none';
            
            // еј·еҲ¶йҮҚз№Әд»ҘеҸ–еҫ—зңҹеҜҰе°әеҜё
            void grid.offsetWidth;
            
            const rect = grid.getBoundingClientRect();
            
            // A4 ж©«ејҸеҸҜз”ЁеҜ¬й«ҳ (жүЈйҷӨйӮҠи·қиҲҮдёҠж–№жЁҷйЎҢ/и¬ӣеҸ°з©әй–“)
            // еҜ¬еәҰзҙ„ 1040pxпјҢй«ҳеәҰзҙ„ 580px
            const availableWidth = 1040; 
            const availableHeight = 580; 
            
            // иЁҲз®—зё®ж”ҫжҜ”дҫӢ (еҸӘзё®е°ҸдёҚж”ҫеӨ§пјҢжңҖеӨ§зӮә 1)
            const scale = Math.min(availableWidth / rect.width, availableHeight / rect.height, 1);
            
            if (scale < 1) {
                grid.style.transform = `scale(${scale})`;
                // зўәдҝқзё®ж”ҫжҷӮд»Ҙй ӮйғЁзҪ®дёӯзӮәеҹәжә–пјҢдёҚжңғеҒҸйӣўи¬ӣеҸ°
                grid.style.transformOrigin = 'top center';
            }
        }

        function removePrintScale() {
            const grid = document.getElementById('seat-grid');
            grid.style.transform = 'none';
        }

        // зӣЈиҒҪеҲ—еҚ°дәӢд»¶ (ж”ҜжҸҙй»һж“ҠжҢүйҲ•жҲ– Ctrl+P)
        window.addEventListener('beforeprint', applyPrintScale);
        window.addEventListener('afterprint', removePrintScale);

        loadData();

    </script>
</body>
</html>
